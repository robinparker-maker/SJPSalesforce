[build]
builder = "dockerfile"
dockerfilePath = "Dockerfile"

[deploy]
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3

[[deploy.healthchecks]]
type = "http"
path = "/api/scrape/status"
# Note: health check path requires auth, so Railway will show a 401 — this is fine.
# Railway only uses this to detect if the process has crashed (connection refused).
